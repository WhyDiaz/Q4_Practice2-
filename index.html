<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body> 
    <h1>Switch Statements</h1>

    <button class="btn btn-info" onclick="teamRank()">Rank</button>
    <script>

        function teamRank(){
            var rank = "1st";

            switch (rank){
                case "1st" :
                    alert("Champion!");
                    break;
                case "2nd" :
                    alert("Second Place!");
                    break;
                case "3rd"  :
                    alert("Third Place!");
                    break;
                case "4th"  :
                    alert("Fourth Place!");
                    break;    
                default :
                alert("Rank could not be determined");
        }
        let team = "Red";

        switch (team){
            case "Red" :
                alert("Go Red Bulldogs!");
                break;
            case "Green" :
                alert("Go Green Hornets!");
                break;
            case "Yellow"  :
                alert("Go Yellow Tigers!");
                break;
            case "Blue" :
                alert("Go Blue bears!");
                break;
            default :
            alert("Team could not be determined");
        }
    </script>
</body>
</html>
