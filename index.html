<body> 
    <h1>Switch Statements</h1>

    <script>
        let team = "Sidewinders";

        switch (team){
            case "Red" :
                alert("Go Red Lancers!");
                break;
            case "Blue"  :
                alert("Go Blue Patriots!");
                break;
            case "Green" :
                alert("Go Green Wizards!");
                break;
            case "Yellow" :
                alert("Go Yellow Zappers!");
            default :
            alert("What USN VAQ is this bro?");
        }
    </script>
