<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body> 
    <h1>Switch Statements</h1>

    <script>
        let team = "Hornets";

        switch (team){
            case "Green" :
                alert("Go Green Hornets!");
                break;
            case "Yellow"  :
                alert("Go Yellow Tigers!");
                break;
            case "Blue" :
                alert("Go Blue bears!");
                break;
            default :
            alert("Team could not be determined");
        }
    </script>
</body>
</html>
